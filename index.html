<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="universe-canvas"></canvas>
    <div class="nebula-overlay"></div>

    <div id="loading-screen" class="glass-panel">
        <div class="loader-content">
            <h1 class="neon-text">XAERISOFT AI</h1>
            <p class="fade-text">Initializing Universe...</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        
        <aside id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <h2>🧠 Xaerisoft AI</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><span>🏠</span> Home</a>
                <a href="#"><span>💬</span> Chat</a>
                <a href="#"><span>📦</span> My Products</a>
                <a href="#"><span>🧠</span> Memory</a>
                <a href="#"><span>⚙️</span> Settings</a>
                <a href="#"><span>ℹ️</span> About</a>
            </nav>
            <div class="toggle-sidebar" id="toggle-btn">◀</div>
        </aside>

        <main id="chat-interface">
            <header class="glass-panel header">
                <div class="header-info">
                    <h2>Xaerisoft Assistant</h2>
                    <div class="status-indicator">
                        <span class="dot online"></span>
                        <span class="status-text">Online</span>
                    </div>
                </div>
                <div class="clock" id="digital-clock">00:00:00</div>
            </header>

            <div id="chat-box" class="chat-box scrollbar-hidden">
                </div>

            <footer class="input-area glass-panel">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Ask me anything..." autocomplete="off">
                    <button id="send-btn" class="neon-button">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
